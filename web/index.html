<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vulnerability Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Header -->
      <header class="app-header">
        <div class="app-logo">
          <i data-lucide="shield" class="logo-icon"></i>
          <div>
            <h1 class="app-title">Vulnerability Agent</h1>
            <p class="app-subtitle">AI-powered vulnerability management</p>
          </div>
        </div>
        <div class="header-right">
          <div class="connection-badge" id="connection-badge">
            <span class="connection-dot" id="status-indicator"></span>
            <span class="connection-label" id="status-text">Disconnected</span>
          </div>
          <div class="header-actions">
            <button id="connect-button" class="btn-header" title="接続">
              <i data-lucide="wifi"></i>
            </button>
            <button id="disconnect-button" class="btn-header" disabled title="切断">
              <i data-lucide="wifi-off"></i>
            </button>
            <div class="header-divider"></div>
            <button id="login-button" class="btn-header" type="button" title="ログイン">
              <i data-lucide="log-in"></i>
            </button>
            <button id="logout-button" class="btn-header" type="button" title="ログアウト">
              <i data-lucide="log-out"></i>
            </button>
            <div class="header-divider"></div>
            <a href="/admin" class="btn-header" title="SBOM・担当者管理">
              <i data-lucide="database"></i>
            </a>
            <button id="toggle-a2a-trace" class="btn-header" type="button" title="A2Aトレースを表示/非表示">
              <i data-lucide="network"></i>
            </button>
          </div>
          <!-- Hidden metrics: IDs kept for JS compatibility -->
          <span id="ping-latency" hidden></span>
          <span id="reconnect-count" hidden></span>
        </div>
      </header>

      <!-- Main content: 2-col layout (history + chat), A2A panel opens on demand -->
      <div class="main-content">
        <!-- Left: Personal history panel -->
        <section class="history-panel" id="history-panel">
          <div class="panel-header">
            <i data-lucide="history"></i>
            <span>Chat Threads</span>
            <span class="history-user" id="history-user"></span>
            <button id="toggle-history" class="history-toggle-btn" type="button" title="履歴パネルを折り畳む" aria-label="Toggle history">
              <i data-lucide="panel-left"></i>
            </button>
          </div>
          <button id="new-thread" class="btn btn-outline history-new-thread" type="button">
            <i data-lucide="plus"></i>
            <span>新規チャット</span>
          </button>
          <div id="history-feed" class="history-feed">
            <div class="activity-empty">
              <i data-lucide="history" class="empty-icon"></i>
              <p>過去のチャットスレッドがここに表示されます。</p>
            </div>
          </div>
        </section>

        <!-- Center: Chat panel (hero) -->
        <section class="chat-panel">
          <div class="panel-header">
            <i data-lucide="message-square"></i>
            <span>Chat</span>
          </div>
          <div id="messages" class="messages-area"></div>

          <!-- Audio controls -->
          <div class="audio-bar" id="audio-bar">
            <button id="start-audio" class="btn btn-audio" disabled title="音声開始">
              <i data-lucide="mic"></i>
            </button>
            <button id="stop-audio" class="btn btn-audio btn-audio-stop" disabled title="音声停止">
              <i data-lucide="mic-off"></i>
            </button>
            <div class="voice-orb voice-orb-idle" id="voice-orb" aria-label="Agent voice status">
              <div class="voice-orb-core"></div>
              <div class="voice-orb-ring"></div>
            </div>
            <div class="audio-level-container" id="audio-level-container">
              <div class="audio-level-bar" id="audio-level-bar"></div>
            </div>
            <span id="audio-status" class="audio-status-text">Idle</span>
          </div>

          <!-- Chat input -->
          <form id="chat-form" class="chat-input-form">
            <textarea
              id="chat-input"
              placeholder="脆弱性について質問してください (Enterで送信 / Shift+Enterで改行)"
              required
              rows="1"
            ></textarea>
            <button type="submit" class="btn btn-send" title="送信">
              <i data-lucide="send"></i>
            </button>
          </form>
        </section>

        <!-- Right: A2A trace panel (hidden by default, shown with body.trace-open) -->
        <section class="a2a-panel" id="a2a-panel">
          <div class="panel-header">
            <i data-lucide="network"></i>
            <span>A2A Trace</span>
            <button class="btn btn-outline btn-clear" id="clear-a2a-trace" title="トレースをクリア">
              <span>Clear</span>
            </button>
          </div>
          <div id="a2a-trace-feed" class="a2a-trace-feed">
            <div class="activity-empty">
              <i data-lucide="network" class="empty-icon"></i>
              <p>A2A呼び出しの送受信はここに表示されます。</p>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- Voice session overlay -->
    <div class="voice-session-overlay" id="voice-session-overlay" aria-live="polite">
      <div class="voice-session-content">
        <div class="voice-orb-large" id="voice-orb-large">
          <svg class="voice-orb-large-svg" viewBox="-120 -120 240 240" aria-hidden="true">
            <path id="voice-orb-large-path" class="voice-orb-large-path"></path>
          </svg>
        </div>
        <div class="voice-session-label" id="voice-session-label">Agent Greeting...</div>
        <button id="voice-session-close" class="btn btn-outline voice-session-close" type="button">
          <i data-lucide="x-circle"></i>
          <span>対話を終了</span>
        </button>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
