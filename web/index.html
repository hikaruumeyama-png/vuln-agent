<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vulnerability Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <div class="app-logo">
            <i data-lucide="shield" class="logo-icon"></i>
            <div>
              <h1 class="app-title">Vulnerability Agent</h1>
              <p class="app-subtitle">AI-powered vulnerability management</p>
            </div>
          </div>
        </div>
        <div class="header-right">
          <div class="connection-badge" id="connection-badge">
            <span class="connection-dot" id="status-indicator"></span>
            <span class="connection-label" id="status-text">Disconnected</span>
          </div>
          <div class="connection-metrics">
            <span id="ping-latency">Ping: -- ms</span>
            <span id="reconnect-count">Reconnects: 0</span>
          </div>
        </div>
      </header>

      <!-- Connection bar -->
      <section class="connection-bar">
        <div class="connection-form">
          <div class="url-input-group">
            <i data-lucide="link" class="input-icon"></i>
            <input
              id="gateway-url"
              type="url"
              placeholder="wss://your-gateway-url/ws"
              class="url-input"
            />
          </div>
          <button id="connect-button" class="btn btn-primary">
            <i data-lucide="wifi"></i>
            <span>Connect</span>
          </button>
          <button id="disconnect-button" class="btn btn-outline" disabled>
            <i data-lucide="wifi-off"></i>
            <span>Disconnect</span>
          </button>
          <button id="login-button" class="btn btn-outline" type="button">
            <i data-lucide="log-in"></i>
            <span>Login</span>
          </button>
          <button id="logout-button" class="btn btn-outline" type="button">
            <i data-lucide="log-out"></i>
            <span>Logout</span>
          </button>
          <button id="toggle-history" class="btn btn-outline" type="button">
            <i data-lucide="panel-left"></i>
            <span>History</span>
          </button>
        </div>
      </section>

      <!-- Main content: three-panel layout -->
      <div class="main-content">
        <!-- Left: Personal history panel -->
        <section class="history-panel" id="history-panel">
          <div class="panel-header">
            <i data-lucide="history"></i>
            <span>Chat Threads</span>
            <span class="history-user" id="history-user">User: anonymous</span>
          </div>
          <button id="new-thread" class="btn btn-outline history-new-thread" type="button">
            <i data-lucide="plus"></i>
            <span>新規チャット</span>
          </button>
          <div id="history-feed" class="history-feed">
            <div class="activity-empty">
              <i data-lucide="history" class="empty-icon"></i>
              <p>このユーザーの過去スレッドがここに表示されます。</p>
            </div>
          </div>
        </section>

        <!-- Center: Chat panel -->
        <section class="chat-panel">
          <div class="panel-header">
            <i data-lucide="message-square"></i>
            <span>Chat</span>
          </div>
          <div class="feature-toolbar" id="feature-toolbar">
            <button class="feature-action-btn" type="button" data-prompt="SBOMの内容を一覧で教えてください。">SBOM一覧</button>
            <button class="feature-action-btn" type="button" data-prompt="SBOMをtypeごとに集計して教えてください。">SBOM集計</button>
            <button class="feature-action-btn" type="button" data-prompt="SIDfmの未読脆弱性メールを確認してください。">未読メール確認</button>
            <button class="feature-action-btn" type="button" data-prompt="A2Aの接続状態を確認してください。">A2A接続確認</button>
            <button class="feature-action-btn" type="button" data-prompt="脆弱性通知文を作成してください。">通知文作成</button>
          </div>
          <div id="messages" class="messages-area"></div>

          <!-- Audio controls -->
          <div class="audio-bar" id="audio-bar">
            <button id="start-audio" class="btn btn-audio" disabled title="Start Audio">
              <i data-lucide="mic"></i>
            </button>
            <button id="stop-audio" class="btn btn-audio btn-audio-stop" disabled title="Stop Audio">
              <i data-lucide="mic-off"></i>
            </button>
            <div class="voice-orb voice-orb-idle" id="voice-orb" aria-label="Agent voice status">
              <div class="voice-orb-core"></div>
              <div class="voice-orb-ring"></div>
            </div>
            <div class="audio-level-container" id="audio-level-container">
              <div class="audio-level-bar" id="audio-level-bar"></div>
            </div>
            <span id="audio-status" class="audio-status-text">Idle</span>
          </div>

          <!-- Chat input -->
          <form id="chat-form" class="chat-input-form">
            <textarea
              id="chat-input"
              placeholder="脆弱性について質問してください (Enterで送信 / Shift+Enterで改行)"
              required
              rows="1"
            ></textarea>
            <button type="submit" class="btn btn-send" title="Send">
              <i data-lucide="send"></i>
            </button>
          </form>
        </section>

        <!-- Right: A2A trace panel -->
        <section class="a2a-panel" id="a2a-panel">
          <div class="panel-header">
            <i data-lucide="network"></i>
            <span>A2A Trace</span>
            <button class="btn btn-outline btn-clear" id="clear-a2a-trace" title="Clear A2A Trace">
              <span>Clear</span>
            </button>
          </div>
          <div id="a2a-trace-feed" class="a2a-trace-feed">
            <div class="activity-empty">
              <i data-lucide="network" class="empty-icon"></i>
              <p>A2A呼び出しの送受信はここに表示されます。</p>
            </div>
          </div>
        </section>
      </div>
    </div>
    <div class="voice-session-overlay" id="voice-session-overlay" aria-live="polite">
      <div class="voice-session-content">
        <div class="voice-orb-large" id="voice-orb-large">
          <svg class="voice-orb-large-svg" viewBox="-120 -120 240 240" aria-hidden="true">
            <path id="voice-orb-large-path" class="voice-orb-large-path"></path>
          </svg>
        </div>
        <div class="voice-session-label" id="voice-session-label">Agent Greeting...</div>
        <button id="voice-session-close" class="btn btn-outline voice-session-close" type="button">
          <i data-lucide="x-circle"></i>
          <span>対話を終了</span>
        </button>
      </div>
    </div>
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
