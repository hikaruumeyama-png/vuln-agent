<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SBOM管理 - Vulnerability Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="app-layout">

      <!-- ヘッダー -->
      <header class="app-header">
        <div class="header-left">
          <div class="app-logo">
            <i data-lucide="shield" class="logo-icon"></i>
            <div>
              <h1 class="app-title">Vulnerability Agent</h1>
              <p class="app-subtitle">SBOM・担当者管理</p>
            </div>
          </div>
        </div>
        <div class="header-right">
          <div class="admin-user-badge" id="admin-user-badge">
            <i data-lucide="user"></i>
            <span class="user-name">---</span>
          </div>
          <a href="/" class="btn btn-outline" title="チャット画面へ戻る">
            <i data-lucide="message-square"></i>
            <span>チャット</span>
          </a>
        </div>
      </header>

      <!-- タブナビゲーション -->
      <nav class="admin-tabs" role="tablist">
        <button class="admin-tab active" data-tab="sbom" role="tab" aria-selected="true">
          <i data-lucide="package"></i>
          SBOMパッケージ
        </button>
        <button class="admin-tab" data-tab="owners" role="tab" aria-selected="false">
          <i data-lucide="users"></i>
          担当者マッピング
        </button>
      </nav>

      <!-- メインコンテンツ -->
      <main class="admin-content">

        <!-- ── SBOMタブ ─────────────────────────────────── -->
        <div id="pane-sbom" class="admin-pane active" role="tabpanel">

          <!-- ツールバー -->
          <div class="admin-toolbar">
            <div class="admin-search-wrap">
              <i data-lucide="search" class="search-icon"></i>
              <input
                id="sbom-search"
                class="admin-search-input"
                type="search"
                placeholder="name / PURL で検索..."
                autocomplete="off"
              />
            </div>
            <span class="admin-count" id="sbom-count">---</span>
            <button id="btn-add-sbom" class="btn btn-primary" type="button">
              <i data-lucide="plus"></i>
              追加
            </button>
          </div>

          <!-- テーブル -->
          <div class="admin-table-container">
            <table class="admin-table" aria-label="SBOMパッケージ一覧">
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Name</th>
                  <th>Version</th>
                  <th>Release</th>
                  <th>PURL</th>
                  <th>OS</th>
                  <th>OS Ver</th>
                  <th>Arch</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="sbom-tbody">
                <tr>
                  <td colspan="9" class="table-loading">
                    <div class="spinner"></div> 読み込み中...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- ページネーション -->
          <div class="admin-pagination">
            <button id="sbom-prev" type="button" disabled title="前のページ">
              <i data-lucide="chevron-left"></i>
            </button>
            <span id="sbom-page-info">1 / 1 ページ</span>
            <button id="sbom-next" type="button" title="次のページ">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
        </div>

        <!-- ── 担当者マッピングタブ ──────────────────────── -->
        <div id="pane-owners" class="admin-pane" role="tabpanel">

          <!-- ツールバー -->
          <div class="admin-toolbar">
            <div class="admin-search-wrap">
              <i data-lucide="search" class="search-icon"></i>
              <input
                id="owner-search"
                class="admin-search-input"
                type="search"
                placeholder="pattern / system_name / email で検索..."
                autocomplete="off"
              />
            </div>
            <span class="admin-count" id="owner-count">---</span>
            <button id="btn-add-owner" class="btn btn-primary" type="button">
              <i data-lucide="plus"></i>
              追加
            </button>
          </div>

          <!-- テーブル -->
          <div class="admin-table-container">
            <table class="admin-table" aria-label="担当者マッピング一覧">
              <thead>
                <tr>
                  <th>Pattern</th>
                  <th>System Name</th>
                  <th>Owner Email</th>
                  <th>Owner Name</th>
                  <th>Notes</th>
                  <th>Priority</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="owner-tbody">
                <tr>
                  <td colspan="7" class="table-loading">
                    <div class="spinner"></div> 読み込み中...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>

    <!-- ── モーダルダイアログ ─────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal-dialog">
        <div class="modal-header">
          <span id="modal-title">エントリを編集</span>
          <button class="modal-close" id="modal-cancel-x" onclick="document.getElementById('modal-cancel').click()" title="閉じる">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- フォームはJSで注入 -->
        </div>
        <div class="modal-footer">
          <button id="modal-cancel" class="btn btn-outline" type="button">キャンセル</button>
          <button id="modal-save"   class="btn btn-primary" type="button">
            <i data-lucide="save"></i>
            保存
          </button>
        </div>
      </div>
    </div>

    <!-- トースト -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
