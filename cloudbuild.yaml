# ====================================================
# Cloud Build CI/CD パイプライン
# ====================================================

substitutions:
  _REGION: asia-northeast1
  _AGENT_NAME: vulnerability-management-agent
  _AGENT_ENGINE_RETENTION: "1"
  _ADK_BUILDER_IMAGE: gcr.io/google.com/cloudsdktool/cloud-sdk
  _FORCE_FULL_DEPLOY: "false"
  _CHANGED_FILES: ""
  _OIDC_ENABLED: "true"
  _OIDC_TENANT_ID: "ec63baa5-2623-40d2-9ef2-58afd2fb0b86"
  _OIDC_CLIENT_ID: "44373ff2-e89e-4b9d-a9d8-ad0d9972ade8"
  _OIDC_REDIRECT_URI: ""
  _OIDC_SCOPES: "openid profile email"
  _OIDC_CLIENT_SECRET_SECRET: "OIDC_CLIENT_SECRET"
  _OIDC_SESSION_SECRET_SECRET: "OIDC_SESSION_SECRET"

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: detect-changes
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail

        flags_file="/workspace/.deploy_flags"
        DEPLOY_AGENT=false
        DEPLOY_GATEWAY=false
        DEPLOY_CHAT_WEBHOOK=false
        DEPLOY_WORKSPACE_EVENTS=false
        DEPLOY_WEB=false
        DEPLOY_VULN_FEEDS=false
        DEPLOY_VULN_INTAKE=false
        DEPLOY_VULN_SCRAPER=false

        full_deploy_raw="${_FORCE_FULL_DEPLOY}"
        full_deploy="$(printf '%s' "$$full_deploy_raw" | tr '[:upper:]' '[:lower:]')"
        changed_files_raw="${_CHANGED_FILES}"

        if [ -z "$$changed_files_raw" ] && [ -d .git ] \
          && [ -n "$${BEFORE_SHA:-}" ] && [ -n "$${COMMIT_SHA:-}" ]; then
          zeros="0000000000000000000000000000000000000000"
          if [ "$$BEFORE_SHA" != "$$zeros" ] && [ "$$BEFORE_SHA" != "$$COMMIT_SHA" ]; then
            changed_files_raw="$(git diff --name-only "$$BEFORE_SHA" "$$COMMIT_SHA" || true)"
          fi
        fi

        if [ "$$full_deploy" = "true" ]; then
          DEPLOY_AGENT=true
          DEPLOY_GATEWAY=true
          DEPLOY_CHAT_WEBHOOK=true
          DEPLOY_WORKSPACE_EVENTS=true
          DEPLOY_WEB=true
          DEPLOY_VULN_FEEDS=true
          DEPLOY_VULN_INTAKE=true
          DEPLOY_VULN_SCRAPER=true
        elif [ -z "$$changed_files_raw" ]; then
          DEPLOY_AGENT=true
          DEPLOY_GATEWAY=true
          DEPLOY_CHAT_WEBHOOK=true
          DEPLOY_WORKSPACE_EVENTS=true
          DEPLOY_WEB=true
          DEPLOY_VULN_FEEDS=true
          DEPLOY_VULN_INTAKE=true
          DEPLOY_VULN_SCRAPER=true
        else
          unknown_path_detected=false
          while IFS= read -r path; do
            [ -z "$$path" ] && continue
            case "$$path" in
              agent/*)
                DEPLOY_AGENT=true
                ;;
              live_gateway/*)
                DEPLOY_GATEWAY=true
                ;;
              chat_webhook/*)
                DEPLOY_CHAT_WEBHOOK=true
                ;;
              workspace_events_webhook/*)
                DEPLOY_WORKSPACE_EVENTS=true
                ;;
              vuln_feeds/*)
                DEPLOY_VULN_FEEDS=true
                ;;
              vuln_intake/*)
                DEPLOY_VULN_INTAKE=true
                ;;
              vuln_scraper/*)
                DEPLOY_VULN_SCRAPER=true
                ;;
              shared/*)
                DEPLOY_GATEWAY=true
                DEPLOY_WORKSPACE_EVENTS=true
                DEPLOY_VULN_FEEDS=true
                DEPLOY_VULN_INTAKE=true
                ;;
              web/*)
                DEPLOY_GATEWAY=true
                DEPLOY_WEB=true
                ;;
              README.md|CLAUDE.md|docs/*|.gitignore)
                ;;
              *)
                unknown_path_detected=true
                ;;
            esac
          done <<< "$(printf '%s' "$$changed_files_raw" | tr ', ' '\n\n')"

          if [ "$$unknown_path_detected" = "true" ]; then
            DEPLOY_AGENT=true
            DEPLOY_GATEWAY=true
            DEPLOY_CHAT_WEBHOOK=true
            DEPLOY_WORKSPACE_EVENTS=true
            DEPLOY_WEB=true
            DEPLOY_VULN_FEEDS=true
            DEPLOY_VULN_INTAKE=true
            DEPLOY_VULN_SCRAPER=true
          fi
        fi

        cat > "$$flags_file" <<EOF
        DEPLOY_AGENT=$$DEPLOY_AGENT
        DEPLOY_GATEWAY=$$DEPLOY_GATEWAY
        DEPLOY_CHAT_WEBHOOK=$$DEPLOY_CHAT_WEBHOOK
        DEPLOY_WORKSPACE_EVENTS=$$DEPLOY_WORKSPACE_EVENTS
        DEPLOY_WEB=$$DEPLOY_WEB
        DEPLOY_VULN_FEEDS=$$DEPLOY_VULN_FEEDS
        DEPLOY_VULN_INTAKE=$$DEPLOY_VULN_INTAKE
        DEPLOY_VULN_SCRAPER=$$DEPLOY_VULN_SCRAPER
        EOF

        echo "デプロイ判定結果:"
        cat "$$flags_file"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: build-env
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_AGENT:-true}" != "true" ]; then
          echo "[Step 1/5] Agent が対象外のため .env 生成をスキップします"
          exit 0
        fi
        echo "[Step 1/5] Secret Manager から .env を生成します（並列取得）"
        fetch_secret() {
          local key="$$1" secret="$$2" default="$$3"
          local val
          val="$$(gcloud secrets versions access latest --secret="$$secret" 2>/dev/null || echo "$$default")"
          echo "$${key}=$${val}"
        }

        fetch_secret "SBOM_DATA_BACKEND" "vuln-agent-sbom-data-backend" "sheets" > /tmp/s01 &
        fetch_secret "SBOM_SPREADSHEET_ID" "vuln-agent-sbom-spreadsheet-id" "" > /tmp/s02 &
        fetch_secret "SBOM_SHEET_NAME" "vuln-agent-sbom-sheet-name" "SBOM" > /tmp/s03 &
        fetch_secret "OWNER_SHEET_NAME" "vuln-agent-owner-sheet-name" "担当者マッピング" > /tmp/s04 &
        fetch_secret "BQ_SBOM_TABLE_ID" "vuln-agent-bq-sbom-table-id" "" > /tmp/s05 &
        fetch_secret "BQ_OWNER_MAPPING_TABLE_ID" "vuln-agent-bq-owner-table-id" "" > /tmp/s06 &
        fetch_secret "DEFAULT_CHAT_SPACE_ID" "vuln-agent-chat-space-id" "" > /tmp/s07 &
        fetch_secret "BQ_HISTORY_TABLE_ID" "vuln-agent-bq-table-id" "" > /tmp/s08 &
        fetch_secret "REMOTE_AGENT_MASTER" "vuln-agent-master-agent-resource-name" "" > /tmp/s09 &
        fetch_secret "REMOTE_AGENT_TEST" "vuln-agent-test-dialog-resource-name" "" > /tmp/s10 &
        fetch_secret "AGENT_MODEL" "vuln-agent-model-name" "" > /tmp/s11 &
        wait

        cat /tmp/s01 /tmp/s02 /tmp/s03 /tmp/s04 /tmp/s05 /tmp/s06 /tmp/s07 /tmp/s08 /tmp/s09 /tmp/s10 /tmp/s11 > agent/.env
        echo "GCP_PROJECT_ID=${PROJECT_ID}" >> agent/.env
        echo "GCP_LOCATION=${_REGION}" >> agent/.env
    waitFor:
      - detect-changes

  - name: "${_ADK_BUILDER_IMAGE}"
    id: deploy-agent
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_AGENT:-true}" != "true" ]; then
          echo "[Step 2/5] Agent が対象外のためデプロイをスキップします"
          exit 0
        fi

        adk_bin=""
        if command -v adk >/dev/null 2>&1; then
          adk_bin="$$(command -v adk)"
        else
          # uv でシステムに直接インストール（venv不要・pip比10倍高速）
          python3 -m pip install --quiet --break-system-packages uv 2>/dev/null || true
          if command -v uv >/dev/null 2>&1; then
            UV_BREAK_SYSTEM_PACKAGES=1 uv pip install --system google-adk
          else
            python3 -m pip install -q --break-system-packages google-adk
          fi
          adk_bin="$$(command -v adk || echo /usr/local/bin/adk)"
        fi

        if [ ! -x "$$adk_bin" ]; then
          echo "adk CLI が見つかりません: $$adk_bin"
          exit 127
        fi

        cd agent
        "$$adk_bin" deploy agent_engine \
          --project=${PROJECT_ID} \
          --region=${_REGION} \
          --display_name=${_AGENT_NAME} \
          --env_file=.env .

        token="$(gcloud auth print-access-token)"
        api_base="https://${_REGION}-aiplatform.googleapis.com/v1"
        engines_json="$(curl -sSf -H "Authorization: Bearer $$token" \
          "$$api_base/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines")"

        latest_engine="$(printf '%s' "$$engines_json" | python3 -c 'import json,sys; display_name=sys.argv[1]; engines=json.load(sys.stdin).get("reasoningEngines", []); filtered=[e for e in engines if e.get("displayName")==display_name and e.get("name")]; filtered.sort(key=lambda e: e.get("createTime", ""), reverse=True); print(filtered[0]["name"] if filtered else "")' "${_AGENT_NAME}")"

        if [ -z "$$latest_engine" ]; then
          echo "エラー: 最新の Agent Engine を特定できませんでした"
          exit 1
        fi

        if ! gcloud secrets describe vuln-agent-resource-name >/dev/null 2>&1; then
          printf 'bootstrap' | gcloud secrets create vuln-agent-resource-name --data-file=- >/dev/null
        fi
        printf '%s' "$$latest_engine" | gcloud secrets versions add vuln-agent-resource-name --data-file=- >/dev/null
        if ! gcloud secrets describe vuln-agent-resource-name-flash >/dev/null 2>&1; then
          printf '%s' "$$latest_engine" | gcloud secrets create vuln-agent-resource-name-flash --data-file=- >/dev/null
        fi
        if ! gcloud secrets describe vuln-agent-resource-name-pro >/dev/null 2>&1; then
          printf '%s' "$$latest_engine" | gcloud secrets create vuln-agent-resource-name-pro --data-file=- >/dev/null
        fi

        # Deploy flash/pro dedicated Agent Engines so router targets always include latest code.
        deploy_variant() {
          local display_name="$$1"
          local model_name="$$2"
          local secret_name="$$3"

          # 並列実行時の tmp ディレクトリ衝突を回避するため作業コピーを作成
          local work_dir="/workspace/variant_$${display_name}"
          mkdir -p "$$work_dir"
          cp -r /workspace/agent/* "$$work_dir/"

          local env_tmp="$${work_dir}/.env.variant.tmp"
          grep -v '^AGENT_MODEL=' /workspace/agent/.env > "$$env_tmp" || true
          printf 'AGENT_MODEL=%s\n' "$$model_name" >> "$$env_tmp"

          cd "$$work_dir"
          "$$adk_bin" deploy agent_engine \
            --project=${PROJECT_ID} \
            --region=${_REGION} \
            --display_name="$$display_name" \
            --env_file="$$env_tmp" .
          cd /workspace/agent

          local variant_latest
          engines_json="$$(curl -sSf -H "Authorization: Bearer $$token" \
            "$$api_base/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines")"
          variant_latest="$$(printf '%s' "$$engines_json" | python3 -c 'import json,sys; display_name=sys.argv[1]; engines=json.load(sys.stdin).get("reasoningEngines", []); filtered=[e for e in engines if e.get("displayName")==display_name and e.get("name")]; filtered.sort(key=lambda e: e.get("createTime", ""), reverse=True); print(filtered[0]["name"] if filtered else "")' "$$display_name")"
          if [ -z "$$variant_latest" ]; then
            sleep 5
            engines_json="$$(curl -sSf -H "Authorization: Bearer $$token" \
              "$$api_base/projects/${PROJECT_ID}/locations/${_REGION}/reasoningEngines")"
            variant_latest="$$(printf '%s' "$$engines_json" | python3 -c 'import json,sys; display_name=sys.argv[1]; engines=json.load(sys.stdin).get("reasoningEngines", []); filtered=[e for e in engines if e.get("displayName")==display_name and e.get("name")]; filtered.sort(key=lambda e: e.get("createTime", ""), reverse=True); print(filtered[0]["name"] if filtered else "")' "$$display_name")"
          fi
          if [ -z "$$variant_latest" ]; then
            echo "エラー: $$display_name の最新 Engine を特定できませんでした"
            exit 1
          fi
          printf '%s' "$$variant_latest" | gcloud secrets versions add "$$secret_name" --data-file=- >/dev/null
          rm -rf "$$work_dir"
        }

        # Flash と Pro を並列デプロイ
        deploy_variant "${_AGENT_NAME}-flash" "gemini-2.5-flash" "vuln-agent-resource-name-flash" > /tmp/deploy_flash.log 2>&1 &
        pid_flash=$$!
        deploy_variant "${_AGENT_NAME}-pro" "gemini-2.5-pro" "vuln-agent-resource-name-pro" > /tmp/deploy_pro.log 2>&1 &
        pid_pro=$$!

        # 両方の完了を待つ
        flash_ok=true
        pro_ok=true
        wait $$pid_flash || flash_ok=false
        wait $$pid_pro || pro_ok=false

        cat /tmp/deploy_flash.log
        cat /tmp/deploy_pro.log

        if [ "$$flash_ok" = "false" ] || [ "$$pro_ok" = "false" ]; then
          echo "エラー: バリアントデプロイに失敗しました"
          exit 1
        fi

        protected_display_names="test-dialog-agent,SecSys Router Engine Tokyo v2"
        retention_count="${_AGENT_ENGINE_RETENTION}"
        if [ -z "$$retention_count" ]; then
          retention_count="1"
        fi
        preserved_engine="$(gcloud secrets versions access latest --secret=vuln-agent-resource-name 2>/dev/null | tr -d '\r\n ' || echo '')"
        preserved_flash_engine="$(gcloud secrets versions access latest --secret=vuln-agent-resource-name-flash 2>/dev/null | tr -d '\r\n ' || echo '')"
        preserved_pro_engine="$(gcloud secrets versions access latest --secret=vuln-agent-resource-name-pro 2>/dev/null | tr -d '\r\n ' || echo '')"
        keep_engine_names="$${latest_engine},$${preserved_engine},$${preserved_flash_engine},$${preserved_pro_engine}"
        delete_targets="$(printf '%s' "$$engines_json" | python3 -c 'import json,sys; keep={x for x in sys.argv[1].split(",") if x}; protected={x for x in sys.argv[2].split(",") if x}; engines=json.load(sys.stdin).get("reasoningEngines", []); out=[]; [out.append((e.get("name") or "").strip()) for e in engines if (e.get("name") or "").strip() and (e.get("displayName") or "").strip() and (e.get("displayName") or "").strip() not in protected and (e.get("displayName") or "").strip().startswith("vulnerability-management-agent") and (e.get("name") or "").strip() not in keep]; print("\n".join(out))' "$$keep_engine_names" "$$protected_display_names")"

        if [ -n "$$delete_targets" ]; then
          echo "Old Agent Engine cleanup targets:"
          printf '%s\n' "$$delete_targets"
          pids=()
          while IFS= read -r engine_name; do
            [ -z "$$engine_name" ] && continue
            (
              for attempt in 1 2 3; do
                http_code="$$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: Bearer $$token" "$$api_base/$$engine_name?force=true" || true)"
                if [ "$$http_code" = "200" ] || [ "$$http_code" = "204" ] || [ "$$http_code" = "404" ]; then
                  exit 0
                fi
                sleep $$((attempt * 2))
              done
              echo "WARN: failed to delete $$engine_name after retries"
            ) &
            pids+=($$!)
          done <<< "$$delete_targets"
          for p in "$${pids[@]}"; do wait "$$p" || true; done
        fi
    waitFor:
      - build-env

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-live-gateway
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_GATEWAY:-true}" != "true" ]; then
          echo "[Step 3/5] Live Gateway が対象外のためデプロイをスキップします"
          exit 0
        fi
        if ! gcloud secrets describe vuln-agent-resource-name >/dev/null 2>&1; then
          echo "警告: vuln-agent-resource-name が存在しないためスキップ"
          exit 0
        fi
        if ! gcloud secrets describe vuln-agent-gemini-api-key >/dev/null 2>&1; then
          echo "警告: vuln-agent-gemini-api-key が存在しないためスキップ"
          exit 0
        fi
        oidc_enabled="$(printf '%s' "${_OIDC_ENABLED}" | tr '[:upper:]' '[:lower:]')"
        if [ "$$oidc_enabled" = "true" ] || [ "$$oidc_enabled" = "1" ] || [ "$$oidc_enabled" = "yes" ] || [ "$$oidc_enabled" = "on" ]; then
          if ! gcloud secrets describe "${_OIDC_CLIENT_SECRET_SECRET}" >/dev/null 2>&1; then
            echo "エラー: OIDC client secret 用 Secret が存在しません: ${_OIDC_CLIENT_SECRET_SECRET}"
            exit 1
          fi
          if ! gcloud secrets describe "${_OIDC_SESSION_SECRET_SECRET}" >/dev/null 2>&1; then
            echo "エラー: OIDC session secret 用 Secret が存在しません: ${_OIDC_SESSION_SECRET_SECRET}"
            exit 1
          fi
        fi
        mkdir -p live_gateway/ui
        cp web/index.html live_gateway/ui/index.html
        cp web/app.js live_gateway/ui/app.js
        cp web/style.css live_gateway/ui/style.css
        cp web/login.html live_gateway/ui/login.html
        cp web/admin.html live_gateway/ui/admin.html
        cp web/admin.js live_gateway/ui/admin.js
        cp web/admin.css live_gateway/ui/admin.css
        gcloud run deploy vuln-agent-live-gateway \
          --source=live_gateway \
          --region=${_REGION} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION},OIDC_ENABLED=${_OIDC_ENABLED},OIDC_TENANT_ID=${_OIDC_TENANT_ID},OIDC_CLIENT_ID=${_OIDC_CLIENT_ID},OIDC_REDIRECT_URI=${_OIDC_REDIRECT_URI},OIDC_SCOPES=${_OIDC_SCOPES}" \
          --update-secrets="AGENT_RESOURCE_NAME=vuln-agent-resource-name:latest,AGENT_RESOURCE_NAME_FLASH=vuln-agent-resource-name-flash:latest,AGENT_RESOURCE_NAME_PRO=vuln-agent-resource-name-pro:latest,GEMINI_API_KEY=vuln-agent-gemini-api-key:latest,OIDC_CLIENT_SECRET=${_OIDC_CLIENT_SECRET_SECRET}:latest,OIDC_SESSION_SECRET=${_OIDC_SESSION_SECRET_SECRET}:latest,BQ_VULN_DEDUP_TABLE_ID=vuln-agent-bq-dedup-table-id:latest,BQ_VULN_POLL_STATE_TABLE_ID=vuln-agent-bq-poll-state-table-id:latest" \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --allow-unauthenticated \
          --memory=512Mi \
          --timeout=3600 \
          --quiet
    waitFor:
      - deploy-agent

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-chat-webhook
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_CHAT_WEBHOOK:-true}" != "true" ]; then
          echo "[Step 4/5] Chat Webhook が対象外のためデプロイをスキップします"
          exit 0
        fi
        if ! gcloud secrets describe vuln-agent-resource-name >/dev/null 2>&1; then
          echo "エラー: vuln-agent-resource-name が存在しません"
          exit 1
        fi
        chat_verify_token="$(gcloud secrets versions access latest --secret=vuln-agent-chat-verification-token 2>/dev/null || echo '')"
        gcloud functions deploy vuln-agent-chat-webhook \
          --gen2 \
          --runtime=python312 \
          --region=${_REGION} \
          --source=chat_webhook \
          --entry-point=handle_chat_event \
          --trigger-http \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --update-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION},CHAT_WEBHOOK_VERIFICATION_TOKEN=$$chat_verify_token" \
          --remove-env-vars="AGENT_RESOURCE_NAME,AGENT_RESOURCE_NAME_FLASH,AGENT_RESOURCE_NAME_PRO" \
          --set-secrets="AGENT_RESOURCE_NAME=vuln-agent-resource-name:latest,AGENT_RESOURCE_NAME_FLASH=vuln-agent-resource-name-flash:latest,AGENT_RESOURCE_NAME_PRO=vuln-agent-resource-name-pro:latest" \
          --memory=1024MB \
          --timeout=540s \
          --quiet
    waitFor:
      - deploy-agent

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-workspace-events-webhook
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_WORKSPACE_EVENTS:-true}" != "true" ]; then
          echo "[Step 5/6] Workspace Events Webhook が対象外のためデプロイをスキップします"
          exit 0
        fi
        if ! gcloud secrets describe vuln-agent-resource-name >/dev/null 2>&1; then
          echo "エラー: vuln-agent-resource-name が存在しません"
          exit 1
        fi
        cp -r shared/ workspace_events_webhook/shared/
        gcloud functions deploy vuln-agent-workspace-events-webhook \
          --gen2 \
          --runtime=python312 \
          --region=${_REGION} \
          --source=workspace_events_webhook \
          --entry-point=handle_workspace_event \
          --trigger-http \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --update-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION}" \
          --remove-env-vars="AGENT_RESOURCE_NAME,AGENT_RESOURCE_NAME_FLASH,AGENT_RESOURCE_NAME_PRO" \
          --set-secrets="AGENT_RESOURCE_NAME=vuln-agent-resource-name:latest,AGENT_RESOURCE_NAME_FLASH=vuln-agent-resource-name-flash:latest,AGENT_RESOURCE_NAME_PRO=vuln-agent-resource-name-pro:latest" \
          --memory=1024MB \
          --timeout=540s \
          --quiet
    waitFor:
      - deploy-agent

  - name: "gcr.io/cloud-builders/gsutil"
    id: deploy-web-ui
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_WEB:-true}" != "true" ]; then
          echo "[Step 5/5] Web UI が対象外のためデプロイをスキップします"
          exit 0
        fi
        BUCKET=gs://${PROJECT_ID}-vuln-agent-ui
        gsutil mb -p ${PROJECT_ID} -l ${_REGION} $$BUCKET 2>/dev/null || true
        gsutil web set -m index.html -e index.html $$BUCKET
        gsutil -m rsync -r -d web $$BUCKET
    waitFor:
      - detect-changes

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-vuln-feeds
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_VULN_FEEDS:-false}" != "true" ]; then
          echo "[Vuln Feeds] 対象外のためデプロイをスキップします"
          exit 0
        fi
        cp -r shared/ vuln_feeds/shared/
        gcloud functions deploy vuln-feed-poller \
          --gen2 \
          --runtime=python312 \
          --region=${_REGION} \
          --source=vuln_feeds \
          --entry-point=poll_vuln_feeds \
          --trigger-http \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --update-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION}" \
          --set-secrets="NVD_API_KEY=vuln-agent-nvd-api-key:latest" \
          --memory=512MB \
          --timeout=540s \
          --quiet
    waitFor:
      - detect-changes

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-vuln-intake
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_VULN_INTAKE:-false}" != "true" ]; then
          echo "[Vuln Intake] 対象外のためデプロイをスキップします"
          exit 0
        fi
        cp -r shared/ vuln_intake/shared/
        cp -r agent/ vuln_intake/agent/
        cp -r vuln_feeds/ vuln_intake/vuln_feeds/
        gcloud functions deploy vuln-intake-worker \
          --gen2 \
          --runtime=python312 \
          --region=${_REGION} \
          --source=vuln_intake \
          --entry-point=handle_vuln_intake \
          --trigger-topic=vuln-agent-new-vulnerabilities \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --update-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${_REGION}" \
          --set-secrets="CHAT_SA_CREDENTIALS_JSON=vuln-agent-chat-sa-key:latest" \
          --memory=1024MB \
          --timeout=540s \
          --quiet
    waitFor:
      - detect-changes

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-vuln-scraper
    entrypoint: bash
    args:
      - "-c"
      - |
        set -euo pipefail
        if [ -f /workspace/.deploy_flags ]; then
          source /workspace/.deploy_flags
        fi
        if [ "${DEPLOY_VULN_SCRAPER:-false}" != "true" ]; then
          echo "[Vuln Scraper] 対象外のためデプロイをスキップします"
          exit 0
        fi
        gcloud run deploy vuln-agent-scraper \
          --source=vuln_scraper \
          --region=${_REGION} \
          --service-account=vuln-agent-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION}" \
          --no-allow-unauthenticated \
          --memory=2Gi \
          --cpu=2 \
          --timeout=120 \
          --min-instances=0 \
          --max-instances=3 \
          --quiet
    waitFor:
      - detect-changes

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 2400s







